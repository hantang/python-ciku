name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Ruff
        run: uvx ruff check .

      - name: Mypy
        run: uvx mypy .

      - name: Tests
        run: uvx pytest

      - name: Build
        run: uv build
